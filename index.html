<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-lg">
                <div class="card-body">
                    <h3 class="text-center mb-4">Login</h3>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="email" placeholder="Enter email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Password" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Login</button>
                        </div>
                    </form>
                    <div id="message" class="text-center mt-3 text-danger fw-bold"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const correctEmail = "admin@gdansk.merito.com";
    const correctPassword = "admin";
    const lockTime = 30 * 1000; // 30 seconds cooldown

    // Initialize localStorage values if missing
    if (!localStorage.getItem('loginAttempts')) {
      localStorage.setItem('loginAttempts', 0);
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const message = document.getElementById('message');
      let attempts = parseInt(localStorage.getItem('loginAttempts')) || 0;
      const lockUntil = parseInt(localStorage.getItem('lockUntil')) || 0;
      const now = Date.now();

      // If currently locked
      if (lockUntil && now < lockUntil) {
        const remaining = Math.ceil((lockUntil - now) / 1000);
        message.textContent = `Too many failed attempts. Please wait ${remaining} seconds.`;
        return;
      }

      // Reset lock after cooldown expired
      if (lockUntil && now >= lockUntil) {
        localStorage.setItem('loginAttempts', 0);
        localStorage.removeItem('lockUntil');
        attempts = 0;
      }

      // Check credentials
      if (email === correctEmail && password === correctPassword) {
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('loginAttempts', 0);
        localStorage.removeItem('lockUntil');
        window.location.href = "admin.html";
      } else {
        attempts++;
        localStorage.setItem('loginAttempts', attempts);
        if (attempts >= 3) {
          const until = now + lockTime;
          localStorage.setItem('lockUntil', until);
          message.textContent = `Too many failed attempts. Please wait 30 seconds.`;
        } else {
          message.textContent = `Invalid credentials. Attempts left: ${3 - attempts}`;
        }
      }
    });

    // Live countdown display
    setInterval(() => {
      const message = document.getElementById('message');
      const lockUntil = parseInt(localStorage.getItem('lockUntil')) || 0;
      const now = Date.now();
      if (lockUntil && now < lockUntil) {
        const remaining = Math.ceil((lockUntil - now) / 1000);
        message.textContent = `Too many failed attempts. Please wait ${remaining} seconds.`;
      } else if (lockUntil && now >= lockUntil) {
        localStorage.setItem('loginAttempts', 0);
        localStorage.removeItem('lockUntil');
        message.textContent = '';
      }
    }, 1000);
</script>

</body>
</html>
